name: Zelta CLI Release

on:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: write
  id-token: write  # required for npm provenance

env:
  BOX_VERSION: '4.7.0'
  BOX_SHA256: '3d390eeaec33288098fe83f8a54c60cc575cb6be295f38ff4482b4b4f26f8d52'

jobs:
  build-phar:
    name: Build PHAR Binary
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          extensions: json, mbstring, sodium

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/cli-v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: packages/zelta-cli
        run: composer install --no-dev --optimize-autoloader

      - name: Download Box (pinned + checksum-verified)
        run: |
          curl -fsSL "https://github.com/box-project/box/releases/download/${BOX_VERSION}/box.phar" -o /tmp/box.phar
          echo "${BOX_SHA256}  /tmp/box.phar" | sha256sum -c -
          sudo mv /tmp/box.phar /usr/local/bin/box
          sudo chmod +x /usr/local/bin/box
          box --version

      - name: Build PHAR
        working-directory: packages/zelta-cli
        run: |
          mkdir -p builds
          box compile

      - name: Verify PHAR
        working-directory: packages/zelta-cli
        run: php builds/zelta.phar list

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: zelta-phar
          path: packages/zelta-cli/builds/zelta.phar
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "Zelta CLI v${{ steps.version.outputs.version }}"
          body: |
            ## Zelta CLI v${{ steps.version.outputs.version }}

            ### Install
            ```bash
            npm install -g @finaegis/cli
            ```

            Requires PHP 8.4+ on PATH.

            ### What's included
            - 25 commands across 8 resource groups
            - Multi-profile authentication
            - Dual output: tables for humans, JSON for pipes
            - x402 + MPP payment protocol support
          files: |
            packages/zelta-cli/builds/zelta.phar
          draft: false
          prerelease: false

  publish-npm:
    name: Publish npm Package
    runs-on: ubuntu-latest
    needs: build-phar
    permissions:
      contents: read
      id-token: write  # sigstore provenance
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download PHAR artifact
        uses: actions/download-artifact@v4
        with:
          name: zelta-phar
          path: packages/zelta-cli/npm-package

      - name: Assemble npm package
        working-directory: packages/zelta-cli
        env:
          PKG_VERSION: ${{ needs.build-phar.outputs.version }}
        run: |
          mkdir -p npm-package/bin
          cat > npm-package/package.json << NPMEOF
          {
            "name": "@finaegis/cli",
            "version": "${PKG_VERSION}",
            "description": "Zelta CLI — manage payments, SMS, wallets, and APIs from the terminal. Requires PHP 8.4+ on PATH.",
            "license": "Apache-2.0",
            "bin": {
              "zelta": "./bin/zelta"
            },
            "files": [
              "bin/",
              "zelta.phar",
              "README.md",
              "LICENSE"
            ],
            "repository": {
              "type": "git",
              "url": "https://github.com/FinAegis/core-banking-prototype-laravel.git",
              "directory": "packages/zelta-cli"
            },
            "homepage": "https://finaegis.org/features/zelta-cli",
            "bugs": {
              "url": "https://github.com/FinAegis/core-banking-prototype-laravel/issues"
            },
            "engines": {
              "node": ">=18"
            },
            "os": ["darwin", "linux", "win32"],
            "publishConfig": {
              "access": "public",
              "provenance": true
            },
            "keywords": ["cli", "payments", "x402", "mpp", "fintech", "sms", "wallet", "agent"]
          }
          NPMEOF
          cat > npm-package/bin/zelta << 'BINEOF'
          #!/usr/bin/env node
          const { execFileSync, spawnSync } = require('child_process');
          const path = require('path');
          const fs = require('fs');

          const phar = path.join(__dirname, '..', 'zelta.phar');
          if (!fs.existsSync(phar)) {
            console.error('Error: zelta.phar missing from package — reinstall @finaegis/cli');
            process.exit(1);
          }

          // Friendly preflight for the #1 install problem.
          const phpCheck = spawnSync('php', ['-v'], { stdio: 'ignore' });
          if (phpCheck.error || phpCheck.status !== 0) {
            console.error('Error: PHP 8.4+ is required on PATH. Install from https://php.net/');
            process.exit(127);
          }

          try {
            execFileSync('php', [phar, ...process.argv.slice(2)], { stdio: 'inherit' });
          } catch (e) {
            process.exit(e.status || 1);
          }
          BINEOF
          chmod +x npm-package/bin/zelta
          cp README.md npm-package/README.md
          cp ../../LICENSE npm-package/LICENSE

      - name: Publish to npm (with provenance)
        working-directory: packages/zelta-cli/npm-package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
