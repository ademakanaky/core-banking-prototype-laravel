name: FinAegis JavaScript SDK Release

on:
  push:
    tags:
      - 'js-sdk-v*'

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # sigstore provenance
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: sdks/javascript/package-lock.json

      - name: Install dependencies
        working-directory: sdks/javascript
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        working-directory: sdks/javascript
        run: npm run build

      - name: Publish to npm (with provenance)
        working-directory: sdks/javascript
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          VERSION="${GITHUB_REF#refs/tags/js-sdk-v}"
          echo "## FinAegis JavaScript SDK v${VERSION} Published" >> "$GITHUB_STEP_SUMMARY"
          echo "Install: \`npm install @finaegis/sdk\`" >> "$GITHUB_STEP_SUMMARY"
