name: Code Quality Pipeline

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version to use'
        required: false
        default: '8.4'
        type: string
    secrets:
      CODECOV_TOKEN:
        required: false

env:
  PHP_VERSION: ${{ inputs.php-version }}
  COMPOSER_PROCESS_TIMEOUT: 0
  COMPOSER_NO_INTERACTION: 1
  COMPOSER_NO_AUDIT: 1

jobs:
  code-standards:
    name: Code Standards & Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, mysql, redis, opcache, gmp
          tools: composer:v2, phpstan, phpcs, php-cs-fixer
          coverage: none
          
      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
      - name: Cache Composer Dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
          
      - name: Setup Environment
        run: |
          cp .env.testing .env
          
      - name: Install Dependencies
        run: |
          # Skip composer scripts during install (filament:upgrade needs full app context).
          # Then run package:discover manually — it works with .env.testing (sqlite/array drivers).
          composer install --prefer-dist --no-progress --optimize-autoloader --no-scripts
          php artisan package:discover --ansi

      - name: Check CI Test Coverage Map
        # Fails when a top-level tests/ directory is not claimed by any CI job
        # (the guard against the drift that let test directories silently fall
        # out of PR CI). See bin/check-test-coverage for the claim map.
        run: bash bin/check-test-coverage

      - name: Run PHP Code Sniffer
        run: vendor/bin/phpcs
        
      - name: Run PHP Static Analysis
        run: vendor/bin/phpstan analyse --memory-limit=2G
        
      - name: Check PHP Code Style
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      # Fails when storage/api-docs/api-docs.json no longer matches the OA
      # annotations in the codebase (CI env uses APP_URL=http://localhost via
      # .env.testing — match it when regenerating locally).
      - name: OpenAPI Drift Check
        run: |
          php artisan l5-swagger:generate
          if ! git diff --exit-code -- storage/api-docs/; then
            echo "::error::storage/api-docs/api-docs.json is out of date with the OpenAPI annotations."
            echo "Regenerate it locally and commit the result:"
            echo "  APP_URL=http://localhost php artisan l5-swagger:generate"
            echo "  git add storage/api-docs/api-docs.json"
            exit 1
          fi

  # NOTE: Dependency security audit moved to 02-security-scan.yml to avoid duplication
  # The security-scan workflow performs comprehensive composer audit with detailed reporting