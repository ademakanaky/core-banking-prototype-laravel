name: Split Monorepo Subdirs into Mirror Repos

on:
  push:
    branches: [main]
    paths:
      - 'packages/zelta-sdk/**'
      - 'packages/zelta-cli/**'
      - 'sdks/php/**'
      - '.github/workflows/monorepo-split.yml'
    tags:
      - 'sdk-v*'
      - 'cli-v*'
      - 'php-sdk-v*'

permissions:
  contents: read

env:
  SPLITSH_VERSION: 'v1.0.1'
  SPLITSH_SHA256: '2539301ce5e21d0ca44b689d0dd2c1b20d9f9e996c1fe6c462afb8af4e7141cc'

jobs:
  split:
    name: Split ${{ matrix.mirror }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - subdir: packages/zelta-sdk
            mirror: payment-sdk
            tag_prefix: sdk-v
            description: 'Zelta Payment SDK — transparent x402 + MPP payment handling for PHP'
          - subdir: packages/zelta-cli
            mirror: cli
            tag_prefix: cli-v
            description: 'Zelta CLI — manage payments, SMS, wallets, and AI agents from the terminal'
          - subdir: sdks/php
            mirror: php-sdk
            tag_prefix: php-sdk-v
            description: 'FinAegis PHP SDK — official PHP client for the FinAegis API'
    steps:
      - name: Checkout (full history, no default credentials)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install splitsh/lite (pinned + checksum-verified)
        run: |
          # splitsh/lite v2.0.0 ships no pre-built binaries; v1.0.1 is the last
          # tag with Linux amd64 artifacts and is what Symfony/Laravel still use.
          curl -fsSL "https://github.com/splitsh/lite/releases/download/${SPLITSH_VERSION}/lite_linux_amd64.tar.gz" -o /tmp/splitsh.tar.gz
          echo "${SPLITSH_SHA256}  /tmp/splitsh.tar.gz" | sha256sum -c -
          tar xzf /tmp/splitsh.tar.gz -C /tmp
          sudo mv /tmp/splitsh-lite /usr/local/bin/
          splitsh-lite --version || true

      - name: Split subdirectory
        id: split
        env:
          SUBDIR: ${{ matrix.subdir }}
          MIRROR: ${{ matrix.mirror }}
        run: |
          SHA=$(splitsh-lite --prefix="${SUBDIR}" --target="refs/heads/split-${MIRROR}")
          if [ -z "$SHA" ]; then
            echo "::error::splitsh-lite produced no SHA — ${SUBDIR} empty or missing"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Split produced SHA: $SHA"

      - name: Push split main to mirror
        env:
          PAT: ${{ secrets.MIRROR_PAT }}
          MIRROR: ${{ matrix.mirror }}
          SPLIT_SHA: ${{ steps.split.outputs.sha }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::error::MIRROR_PAT secret is empty or missing"
            exit 1
          fi
          git push "https://x-access-token:${PAT}@github.com/FinAegis/${MIRROR}.git" \
            "${SPLIT_SHA}:refs/heads/main" --force

      - name: Push tag to mirror
        if: startsWith(github.ref, 'refs/tags/')
        env:
          PAT: ${{ secrets.MIRROR_PAT }}
          MIRROR: ${{ matrix.mirror }}
          TAG_PREFIX: ${{ matrix.tag_prefix }}
          SPLIT_SHA: ${{ steps.split.outputs.sha }}
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          if [[ "$REF" == ${TAG_PREFIX}* ]]; then
            MIRROR_TAG="v${REF#${TAG_PREFIX}}"
            echo "Pushing tag ${MIRROR_TAG} to FinAegis/${MIRROR}"
            git push "https://x-access-token:${PAT}@github.com/FinAegis/${MIRROR}.git" \
              "${SPLIT_SHA}:refs/tags/${MIRROR_TAG}"
          else
            echo "Tag ${REF} does not match prefix ${TAG_PREFIX} — skipping tag push for this mirror"
          fi
