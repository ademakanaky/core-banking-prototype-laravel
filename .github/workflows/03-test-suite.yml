name: Test Suite Pipeline

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version to use'
        required: false
        default: '8.4'
        type: string
      node-version:
        description: 'Node.js version to use'
        required: false
        default: '20'
        type: string
    secrets:
      CODECOV_TOKEN:
        required: false

env:
  PHP_VERSION: ${{ inputs.php-version }}
  NODE_VERSION: ${{ inputs.node-version }}
  COMPOSER_PROCESS_TIMEOUT: 0
  COMPOSER_NO_INTERACTION: 1
  COMPOSER_NO_AUDIT: 1

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, mysql, redis, opcache, pcntl, gd, imagick, bcmath, intl, zip, soap, gmp
          tools: composer:v2
          # No job in this workflow generates coverage; loading Xdebug only
          # slows the suites down.
          coverage: none
          ini-values: |
            memory_limit=1G
            max_execution_time=360
            
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            node_modules
            ~/.npm
          key: ${{ runner.os }}-deps-${{ hashFiles('**/composer.lock', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-
            
      - name: Setup Environment
        run: |
          cp .env.testing .env
          
      - name: Install PHP Dependencies
        run: |
          # Try composer install with retry logic for flaky downloads
          for i in 1 2 3; do
            if composer install --prefer-dist --no-progress --optimize-autoloader; then
              echo "Composer install succeeded on attempt $i"
              break
            else
              echo "Composer install failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "All attempts failed"
                exit 1
              fi
              echo "Retrying in 5 seconds..."
              sleep 5
              # Clear composer cache for problematic packages
              composer clear-cache
            fi
          done
          composer dump-autoload
          
      - name: Install Node Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          npm run build
          
      - name: Prepare Laravel Application
        run: |
          # Configure MySQL database connection for CI
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=testing" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=root" >> .env
          
          # Note: Route caching disabled to prevent memory exhaustion in tests
          php artisan config:clear
          php artisan route:clear
          php artisan migrate --force
          
      - name: Run Unit Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          CI: true
          PEST_NO_SORT: true
          MEMORY_LIMIT: 1G
          PEST_PARALLEL: true
          PARALLEL_PROCS: 2
        run: |
          # Run unit tests using SQLite in-memory database
          # Memory increased to 1G and parallel enabled with 2 processes

          # Use the batch runner for memory-efficient execution
          chmod +x ./bin/pest-batch ./bin/pest-rest

          # First batch: Domain unit tests (parallel enabled)
          ./bin/pest-batch tests/Unit/Domain || exit 1

          # Second batch: HTTP and Services unit tests (parallel enabled)
          ./bin/pest-batch tests/Unit/Http tests/Unit/Services || exit 1

          # Third batch: everything else under tests/Unit — computed by
          # exclusion, so a new directory can never silently fall out of CI
          ./bin/pest-rest tests/Unit tests/Unit/Domain tests/Unit/Http tests/Unit/Services || exit 1

          # Fourth batch: top-level component test dirs (Jetstream actions,
          # Filament admin, smoke tests, ...) that belong to no other job
          ./bin/pest-batch tests/Actions tests/Filament tests/Http tests/Infrastructure tests/Models tests/Providers tests/Values tests/View tests/Smoke || exit 1
          
      # NOTE: Security tests are NOT run here to avoid duplication.
      # Security tests run comprehensively in 04-security-tests.yml with MySQL:
      # - Penetration Tests
      # - Authentication Security Tests
      # - API Security Tests
      # - Vulnerability Tests

      # Coverage upload disabled since we're not generating coverage to save memory
      # - name: Upload Test Coverage
      #   uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     file: ./coverage.xml
      #     flags: unittests
      #     name: codecov-umbrella

  feature-tests:
    name: Feature Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    # Sharded 3-way: the single job ran 24m+ of a 30m cap and only covered
    # 7 of 47 tests/Feature directories. Each shard now runs a slice; the
    # "extended" shard is computed by exclusion (bin/pest-rest) so newly
    # added directories are always picked up.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [api, core, extended]
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, mysql, redis, opcache, pcntl, gd, imagick, bcmath, intl, zip, soap, gmp
          tools: composer:v2
          coverage: none
          
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            node_modules
            ~/.npm
          key: ${{ runner.os }}-feature-deps-${{ hashFiles('**/composer.lock', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-feature-deps-

      - name: Setup Environment
        run: |
          cp .env.testing .env

      - name: Install Dependencies
        run: |
          # Try composer install with retry logic for flaky downloads
          for i in 1 2 3; do
            if composer install --prefer-dist --no-progress --optimize-autoloader; then
              echo "Composer install succeeded on attempt $i"
              break
            else
              echo "Composer install failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "All attempts failed"
                exit 1
              fi
              echo "Retrying in 5 seconds..."
              sleep 5
              # Clear composer cache for problematic packages
              composer clear-cache
            fi
          done
          npm ci --prefer-offline --no-audit
          npm run build

      - name: Prepare Laravel Application
        run: |
          # Configure MySQL database connection for CI
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=testing" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=root" >> .env

          # Note: Route caching disabled to prevent memory exhaustion in tests
          php artisan config:clear
          php artisan route:clear
          php artisan migrate --force

      - name: Run Feature Tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
          CI: true
          PEST_NO_SORT: true
          MEMORY_LIMIT: 2G
          PEST_PARALLEL: false
        run: |
          # Run feature tests in batches with 2G memory
          # Parallel disabled for feature tests (database state conflicts)

          # Use the batch runners for memory-efficient execution
          chmod +x ./bin/pest-batch ./bin/pest-rest

          case "${{ matrix.shard }}" in
            api)
              # Largest single directory (~84 files) gets its own shard
              ./bin/pest-batch tests/Feature/Api || exit 1
              ;;
            core)
              ./bin/pest-batch tests/Feature/Http tests/Feature/Domain tests/Feature/Models || exit 1
              ./bin/pest-batch tests/Feature/Cache tests/Feature/Exchange tests/Feature/Basket || exit 1
              # Console + Subscription moved here from the extended shard,
              # which was brushing its 30-minute cap (timed out at 30m16s).
              ./bin/pest-batch tests/Feature/Console tests/Feature/Subscription || exit 1
              ;;
            extended)
              # Everything else under tests/Feature — computed by exclusion,
              # so a new directory can never silently fall out of CI. The
              # exclusion list must match the api/core shards above.
              ./bin/pest-rest tests/Feature \
                tests/Feature/Api \
                tests/Feature/Http tests/Feature/Domain tests/Feature/Models \
                tests/Feature/Cache tests/Feature/Exchange tests/Feature/Basket \
                tests/Feature/Console tests/Feature/Subscription || exit 1
              ;;
          esac

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
